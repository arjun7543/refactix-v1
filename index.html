<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refactix — AI Code Studio</title>
<meta name="description" content="AI-powered code editor. Review, fix, convert, and run code. No signup required.">
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#060409;--base:#0b0810;--layer:#100d18;--surface:#16121f;--raised:#1d1829;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.15);--border-bright:rgba(255,255,255,0.22);
  --text:#ede9ff;--text2:#9d93bb;--text3:#4d4568;--text4:#2d2840;
  --cyan:#00d9f5;--violet:#7c3aed;--rose:#f43f5e;--emerald:#10b981;
  --amber:#f59e0b;--indigo:#6366f1;--pink:#db2777;--teal:#14b8a6;
  --glass-bg:rgba(22,18,31,0.7);--glass-border:rgba(255,255,255,0.08);
}
html{height:100%;overflow:hidden}
body{background:var(--void);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;line-height:1.5;height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ── AURORA ── */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:drift 25s ease-in-out infinite}
.o1{width:800px;height:800px;background:radial-gradient(circle,rgba(124,58,237,.25) 0%,transparent 70%);top:-300px;left:-200px;animation-delay:0s}
.o2{width:600px;height:600px;background:radial-gradient(circle,rgba(0,217,245,.15) 0%,transparent 70%);top:10%;right:-200px;animation-delay:-9s}
.o3{width:500px;height:500px;background:radial-gradient(circle,rgba(244,63,94,.12) 0%,transparent 70%);bottom:-150px;left:15%;animation-delay:-17s}
.o4{width:400px;height:400px;background:radial-gradient(circle,rgba(16,185,129,.1) 0%,transparent 70%);bottom:20%;right:5%;animation-delay:-6s;animation-duration:30s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-25px) scale(1.04)}66%{transform:translate(-15px,30px) scale(0.96)}}

/* ── NAV ── */
.nav{
  position:relative;z-index:100;height:52px;flex-shrink:0;
  background:rgba(6,4,9,.8);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:0;
}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;padding-right:20px;border-right:1px solid var(--border);margin-right:16px}
.logo-gem{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--violet),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:white;
  box-shadow:0 0 20px rgba(124,58,237,.4),0 0 40px rgba(0,217,245,.1),inset 0 1px 0 rgba(255,255,255,.2);
  position:relative;overflow:hidden;flex-shrink:0;
}
.logo-gem::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 50%)}
.logo-name{font-family:'Clash Display',sans-serif;font-size:17px;font-weight:600;letter-spacing:-.3px;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-tabs{display:flex;gap:2px;flex:1}
.ntab{
  display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:7px;
  font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;
  border:none;background:none;font-family:'Outfit',sans-serif;transition:all .18s;
}
.ntab svg{width:13px;height:13px;flex-shrink:0}
.ntab:hover{color:var(--text2);background:rgba(255,255,255,.04)}
.ntab.active{color:var(--text);background:rgba(255,255,255,.07)}
.ntab.active.t-review{color:var(--cyan)}
.ntab.active.t-fix{color:var(--emerald)}
.ntab.active.t-convert{color:var(--violet)}
.ntab.active.t-run{color:var(--amber)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px;border-left:1px solid var(--border)}
.nav-badge{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.nb-live{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--emerald)}
.nb-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--emerald);animation:pulse-g 2s ease-in-out infinite;display:block}
@keyframes pulse-g{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 4px rgba(16,185,129,0)}}
.nb-free{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);color:#a78bfa}

/* ── MAIN LAYOUT ── */
.workspace{display:flex;flex:1;overflow:hidden;position:relative;z-index:1}

/* ── LEFT: EDITOR PANE ── */
.editor-pane{
  width:52%;min-width:320px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
}

/* Editor toolbar */
.ed-bar{
  height:42px;flex-shrink:0;
  background:rgba(16,12,25,.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
.lang-sel{
  background:rgba(255,255,255,.05);border:1px solid var(--border);border-top-color:var(--border-hi);
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;
  padding:4px 10px;border-radius:6px;cursor:pointer;outline:none;
  appearance:none;-webkit-appearance:none;
}
.lang-sel option{background:#1d1829}
.ed-sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.ed-stat{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-left:auto}
.ed-btn{
  display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;
  font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--text2);transition:all .15s;
  font-family:'Outfit',sans-serif;white-space:nowrap;
}
.ed-btn:hover{background:rgba(255,255,255,.08);color:var(--text);border-color:var(--border-hi)}
.ed-btn svg{width:11px;height:11px}
.ed-btn.primary{background:linear-gradient(135deg,var(--violet),var(--indigo));color:white;border-color:rgba(124,58,237,.4);box-shadow:0 0 16px rgba(124,58,237,.25)}
.ed-btn.primary:hover{box-shadow:0 0 24px rgba(124,58,237,.4);transform:translateY(-1px)}
.ed-btn.run-btn{background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.1));color:var(--amber);border-color:rgba(245,158,11,.3)}
.ed-btn.run-btn:hover{background:linear-gradient(135deg,rgba(245,158,11,.3),rgba(245,158,11,.15));box-shadow:0 0 16px rgba(245,158,11,.2)}

/* Code editor area */
.ed-main{flex:1;display:flex;overflow:hidden;position:relative}
.gutter{
  width:52px;flex-shrink:0;padding:14px 0;
  background:rgba(0,0,0,.25);border-right:1px solid rgba(255,255,255,.04);
  text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;
  line-height:1.6;color:var(--text3);user-select:none;pointer-events:none;overflow:hidden;
}
.gutter span{display:block;padding-right:14px;height:19.2px}
textarea#code{
  flex:1;padding:14px 16px;background:transparent;border:none;outline:none;
  font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;
  color:var(--text);resize:none;tab-size:2;caret-color:var(--cyan);
  height:100%;
}
textarea#code::placeholder{color:var(--text3);font-family:'Outfit',sans-serif;font-size:13px}

/* Convert target bar */
.convert-bar{
  flex-shrink:0;padding:10px 12px;border-top:1px solid var(--border);
  background:rgba(16,12,25,.9);display:none;align-items:center;gap:10px;flex-wrap:wrap;
}
.convert-bar.show{display:flex}
.cb-label{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap;display:flex;align-items:center;gap:6px}
.cb-label svg{width:12px;height:12px;color:var(--violet)}
.tgt-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.tpill{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text3);background:rgba(255,255,255,.04);border:1px solid var(--border);cursor:pointer;transition:all .14s}
.tpill:hover{background:rgba(255,255,255,.08);color:var(--text)}
.tpill.sel{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(99,102,241,.15));color:#a78bfa;border-color:rgba(124,58,237,.4);box-shadow:0 0 10px rgba(124,58,237,.15)}

/* Stdin bar */
.stdin-bar{
  flex-shrink:0;border-top:1px solid var(--border);background:rgba(16,12,25,.9);
  display:none;
}
.stdin-bar.show{display:block}
.stdin-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:6px 12px 0}
textarea#stdin{
  width:100%;height:60px;background:transparent;border:none;outline:none;
  padding:6px 12px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;
  color:var(--text2);resize:none;
}
textarea#stdin::placeholder{color:var(--text3)}

/* ── RIGHT: OUTPUT PANE ── */
.output-pane{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:rgba(11,8,16,.6);
}
.out-header{
  height:42px;flex-shrink:0;
  background:rgba(16,12,25,.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:8px;
}
.out-title{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:7px}
.out-title svg{width:13px;height:13px}
.out-mode-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.out-mode-tag.review{background:rgba(0,217,245,.1);color:var(--cyan);border:1px solid rgba(0,217,245,.2)}
.out-mode-tag.fix{background:rgba(16,185,129,.1);color:var(--emerald);border:1px solid rgba(16,185,129,.2)}
.out-mode-tag.convert{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}
.out-mode-tag.run{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.out-clear{margin-left:auto;font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;transition:color .15s}
.out-clear:hover{color:var(--text2)}

.out-body{flex:1;overflow-y:auto;padding:16px}
.out-body::-webkit-scrollbar{width:5px}
.out-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

/* ── EMPTY STATE ── */
.empty-state{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;color:var(--text3);
}
.empty-icon{
  width:64px;height:64px;border-radius:18px;margin:0 auto 20px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.empty-icon svg{width:28px;height:28px}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-sub{font-size:13px;line-height:1.6;max-width:240px}
.empty-shortcuts{display:flex;flex-direction:column;gap:6px;margin-top:24px}
.esc{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3)}
.esc-key{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2)}

/* ── LOADING ── */
.loading{display:none;padding:32px 0;text-align:center}
.loading.show{display:block}
.load-ring{width:40px;height:40px;margin:0 auto 20px;position:relative}
.load-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid rgba(255,255,255,.06)}
.load-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--cyan);border-right-color:rgba(124,58,237,.5);animation:spin .8s linear infinite;box-shadow:0 0 16px rgba(0,217,245,.25)}
@keyframes spin{to{transform:rotate(360deg)}}
.load-steps{display:flex;justify-content:center;gap:24px;margin-bottom:16px;flex-wrap:wrap}
.lstep{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text3);transition:all .3s}
.lstep.done{color:var(--emerald)}
.lstep.act{color:var(--text)}
.ls-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.08);transition:all .3s;flex-shrink:0}
.lstep.done .ls-dot{background:var(--emerald);box-shadow:0 0 8px rgba(16,185,129,.5)}
.lstep.act .ls-dot{background:var(--cyan);box-shadow:0 0 8px rgba(0,217,245,.5);animation:pulse-g .8s ease-in-out infinite}
.load-msg{font-size:12px;color:var(--text3);animation:fp 1.5s ease-in-out infinite}
@keyframes fp{0%,100%{opacity:.4}50%{opacity:1}}

/* ── ERROR ── */
.err-block{display:none;background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.18);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:var(--rose);align-items:center;gap:10px}
.err-block.show{display:flex}
.err-block svg{width:14px;height:14px;flex-shrink:0}

/* ── GLASS CARD ── */
.gc{
  background:rgba(22,18,31,.6);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,.07);border-top-color:rgba(255,255,255,.14);
  border-radius:12px;overflow:hidden;margin-bottom:12px;
}
.gc-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2)}
.gc-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--text)}
.gc-title svg{width:13px;height:13px}
.gc-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.gb-cyan{background:rgba(0,217,245,.1);color:var(--cyan);border:1px solid rgba(0,217,245,.2)}
.gb-green{background:rgba(16,185,129,.1);color:var(--emerald);border:1px solid rgba(16,185,129,.2)}
.gb-rose{background:rgba(244,63,94,.1);color:var(--rose);border:1px solid rgba(244,63,94,.2)}
.gb-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.gb-violet{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}
.gc-actions{display:flex;gap:5px}
.sm-btn{display:flex;align-items:center;gap:4px;height:26px;padding:0 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--text2);transition:all .14s;font-family:'Outfit',sans-serif}
.sm-btn:hover{background:rgba(255,255,255,.09);color:var(--text)}
.sm-btn svg{width:10px;height:10px}

/* SCORE ROW */
.score-row{display:flex;align-items:center;gap:16px;padding:16px}
.score-donut{position:relative;width:72px;height:72px;flex-shrink:0}
.score-donut svg{transform:rotate(-90deg)}
.score-donut-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600}
.score-info{}
.score-verdict{font-family:'Clash Display',sans-serif;font-size:20px;font-weight:600;letter-spacing:-.02em;color:var(--text);margin-bottom:4px}
.score-summary{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.score-bar-t{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.score-bar-f{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.16,1,.3,1)}

/* COMPLEXITY GRID */
.cx-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.cx-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px}
.cx-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.cx-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;margin-bottom:4px}
.cx-val.green{color:var(--emerald)}.cx-val.amber{color:var(--amber)}.cx-val.red{color:var(--rose)}
.cx-note{font-size:11px;color:var(--text3);line-height:1.4}
.cx-bar-t{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-top:8px}
.cx-bar-f{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.16,1,.3,1)}

/* ISSUE LIST */
.issue-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.1)}
.itab{flex:1;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .16s;font-family:'Outfit',sans-serif}
.itab:hover{background:rgba(255,255,255,.03)}
.itab.active{background:rgba(255,255,255,.04);border-bottom-color:var(--cyan)}
.itab-n{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;line-height:1}
.itab-l{font-size:10px;font-weight:600;color:var(--text3)}
.itab.active .itab-l{color:var(--text2)}
.ic-r{color:var(--rose)}.ic-a{color:var(--amber)}.ic-b{color:var(--cyan)}.ic-g{color:var(--emerald)}
.ipane{display:none}
.ipane.active{display:block}
.ii{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .14s}
.ii:last-child{border:none}
.ii:hover{background:rgba(255,255,255,.03)}
.ii-left{flex-shrink:0}
.ii-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.ii-icon svg{width:12px;height:12px}
.ii-icon.r{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.18)}
.ii-icon.a{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.18)}
.ii-icon.b{background:rgba(0,217,245,.08);border:1px solid rgba(0,217,245,.18)}
.ii-icon.g{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18)}
.ii-sev{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);text-align:center;margin-top:4px}
.ii-right{}
.ii-line{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:2px}
.ii-text{font-size:12px;color:var(--text2);line-height:1.5}
.no-ii{padding:24px 16px;text-align:center;color:var(--text3);font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.no-ii svg{width:14px;height:14px;color:var(--emerald)}

/* ALTERNATIVES */
.alt-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.alt-item:last-child{border:none}
.alt-num{width:22px;height:22px;border-radius:50%;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.25);color:#a78bfa;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.alt-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.alt-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px}
.alt-chips{display:flex;gap:6px;flex-wrap:wrap}
.alt-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.ac-green{background:rgba(16,185,129,.1);color:var(--emerald);border:1px solid rgba(16,185,129,.2)}
.ac-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.ac-violet{background:rgba(124,58,237,.1);color:#a78bfa;border:1px solid rgba(124,58,237,.2)}

/* CODE OUTPUT BLOCK */
.code-out{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:8px;overflow:hidden}
.co-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}

pre.co-pre::-webkit-scrollbar{width:4px}
pre.co-pre::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* BUG FIX SPECIFIC */
.bug-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.bug-item:last-child{border:none}
.bug-sev{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.bs-critical{background:rgba(244,63,94,.15);color:var(--rose);border:1px solid rgba(244,63,94,.3)}
.bs-high{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.bs-medium{background:rgba(0,217,245,.08);color:var(--cyan);border:1px solid rgba(0,217,245,.2)}
.bs-low{background:rgba(16,185,129,.08);color:var(--emerald);border:1px solid rgba(16,185,129,.2)}
.bug-body{}
.bug-line{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:3px}
.bug-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:4px}
.bug-suggest{font-size:11px;color:var(--teal);line-height:1.5;font-style:italic}

/* RUN OUTPUT */
.run-out{padding:16px}
.run-meta{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.run-meta-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.run-meta-item strong{color:var(--text2)}
.run-stdout{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;color:rgba(237,233,255,.75);white-space:pre-wrap;min-height:60px;max-height:300px;overflow-y:auto}
.run-stderr{background:rgba(244,63,94,.05);border:1px solid rgba(244,63,94,.15);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;color:rgba(244,63,94,.85);white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-top:10px}
.run-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.run-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px}
.rs-ok{background:rgba(16,185,129,.1);color:var(--emerald);border:1px solid rgba(16,185,129,.2)}
.rs-err{background:rgba(244,63,94,.1);color:var(--rose);border:1px solid rgba(244,63,94,.2)}

/* CONVERT OUTPUT */
.convert-notes{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.cn-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);line-height:1.5;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cn-item:last-child{border:none}
.cn-arrow{color:var(--violet);flex-shrink:0;font-weight:700}
.cn-warn{color:var(--amber)}

/* APPLY FIX BUTTON */
.apply-fix-btn{
  display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(20,184,166,.15));
  border:1px solid rgba(16,185,129,.3);color:var(--emerald);

}
.apply-fix-btn:hover{background:linear-gradient(135deg,rgba(16,185,129,.3),rgba(20,184,166,.2));box-shadow:0 0 20px rgba(16,185,129,.2)}
.apply-fix-btn svg{width:13px;height:13px}

/* STATUS BAR */
.status-bar{
  position:relative;z-index:100;height:24px;flex-shrink:0;
  background:rgba(6,4,9,.9);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:16px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);
}
.sb-item{display:flex;align-items:center;gap:5px}

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CHANGE THIS after deploying backend to Render:
const API = "https://YOUR-APP.onrender.com";
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

let mode = 'review', lang = 'python', tgtLang = 'javascript';
let loadTimer;

const LANGS = {python:'Python',javascript:'JavaScript',typescript:'TypeScript',go:'Go',rust:'Rust',java:'Java',cpp:'C++',php:'PHP',sql:'SQL',swift:'Swift',kotlin:'Kotlin',ruby:'Ruby',csharp:'C#',bash:'Bash'};
const TGT_LANGS = ['javascript','typescript','go','rust','java','cpp','python','php','swift','kotlin','ruby','csharp'];

const SAMPLES = {
python:`def find_duplicates(arr):
    seen = []
    dups = []
    for item in arr:
        if item in seen:
            dups.append(item)
        seen.append(item)
    return dups

def get_user(id):
    query = "SELECT * FROM users WHERE id = " + id
    return db.execute(query)`,
javascript:`function fetchUser(id) {

  xhr.send();
  var user = JSON.parse(xhr.responseText);
  document.getElementById('name').innerHTML = user.name;
  return user;
}`,
go:`func linearSearch(arr []int, target int) int {
    for i := 0; i < len(arr); i++ {
        if arr[i] == target {
            return i
        }
    }
    return -1
}`,
java:`public class Calculator {
    public int add(String a, String b) {
        return Integer.parseInt(a) + Integer.parseInt(b);
    }
    public double divide(int x, int y) {
        return x / y;
    }
}`,
cpp:`#include <iostream>
#include <string>
using namespace std;

int main() {
    char name[10];
    cout << "Enter name: ";
    cin >> name;
    string greeting = "Hello, " + string(name) + "!";
    cout << greeting << endl;
    return 0;
}`
};

const MODE_CONFIG = {
  review: {label:'Review Code', steps:['Reading code','Scanning issues','Analyzing complexity','Generating report'], tag:'review', tagLabel:'Review'},
  fix:    {label:'Fix Bugs',    steps:['Scanning code','Detecting bugs','Generating fixes','Finalizing'],          tag:'fix',    tagLabel:'Bug Fixer'},
  convert:{label:'Convert',     steps:['Reading source','Translating','Adapting idioms','Done'],                   tag:'convert',tagLabel:'Convert'},
  run:    {label:'Run Code',    steps:['Compiling','Executing','Collecting output','Done'],                         tag:'run',    tagLabel:'Run'}
};

// ── MODE ──
function setMode(m) {
  mode = m;
  document.querySelectorAll('.ntab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + m).classList.add('active');

  const cfg = MODE_CONFIG[m];
  document.getElementById('action-btn').innerHTML = `<svg viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M3.5 5.5l1.5 1.5 2.5-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>${cfg.label}`;
  document.getElementById('out-mode-tag').textContent = cfg.tagLabel;
  document.getElementById('out-mode-tag').className = 'out-mode-tag ' + cfg.tag;
  document.getElementById('sb-mode').textContent = cfg.tagLabel + ' Mode';

  // Show/hide convert bar and stdin
  document.getElementById('convert-bar').classList.toggle('show', m === 'convert');
  document.getElementById('stdin-bar').classList.toggle('show', m === 'run');
  document.getElementById('run-quick').style.display = m === 'run' ? 'flex' : 'none';
  document.getElementById('action-btn').style.display = m === 'run' ? 'none' : 'flex';

  clearOutput();
}

// ── LANG ──
function onLangChange() {
  lang = document.getElementById('lang-sel').value;
  document.getElementById('sb-lang').textContent = LANGS[lang] || lang;
  // Rebuild target pills excluding current lang
  buildTgtPills();
}

function buildTgtPills() {
  const container = document.getElementById('tgt-pills');
  const available = TGT_LANGS.filter(l => l !== lang);
  if (!available.includes(tgtLang)) tgtLang = available[0];
  container.innerHTML = available.map(l =>
    `<button class="tpill ${l === tgtLang ? 'sel' : ''}" onclick="setTgt('${l}',this)">${LANGS[l]||l}</button>`
  ).join('');
}

function setTgt(l, btn) {
  tgtLang = l;
  document.querySelectorAll('.tpill').forEach(p => p.classList.remove('sel'));
  btn.classList.add('sel');
}

// ── EDITOR ──
function onCodeInput() {
  const ta = document.getElementById('code');
  const lines = (ta.value.match(/\n/g) || []).length + 1;
  document.getElementById('gutter').innerHTML = Array.from({length: lines}, (_, i) => `<span>${i + 1}</span>`).join('');
  document.getElementById('ed-stat').textContent = `${lines} line${lines !== 1 ? 's' : ''}`;
  updateCursor();
}

function syncGutter() {
  document.getElementById('gutter').scrollTop = document.getElementById('code').scrollTop;
}

function handleTab(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target, s = ta.selectionStart;
    ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 2;
    onCodeInput();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); go(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); loadSample(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); clearEditor(); }
}

function updateCursor() {
  const ta = document.getElementById('code');
  const text = ta.value.substring(0, ta.selectionStart);
  const lines = text.split('\n');
  const ln = lines.length, col = lines[lines.length - 1].length + 1;
  document.getElementById('sb-cursor').textContent = `Ln ${ln}, Col ${col}`;
}

function loadSample() {
  document.getElementById('code').value = SAMPLES[lang] || SAMPLES.python;
  onCodeInput();
}

function clearEditor() {
  document.getElementById('code').value = '';
  onCodeInput();
}

// ── OUTPUT ──
function clearOutput() {
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('err-block').classList.remove('show');
  document.getElementById('loading').classList.remove('show');
  document.getElementById('empty-state').style.display = 'flex';
}

function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  document.getElementById('err-block').classList.add('show');
  document.getElementById('empty-state').style.display = 'none';
}

function hideEmpty() {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('err-block').classList.remove('show');
}

// ── LOADING ──
const STEPS_MAP = {
  review: ['Reading code','Scanning issues','Analyzing complexity','Building report'],
  fix:    ['Scanning code','Detecting bugs','Generating fixes','Finalizing'],
  convert:['Reading source','Translating','Adapting idioms','Done'],
  run:    ['Submitting','Executing','Collecting output','Done']
};

function startLoad() {
  hideEmpty();
  document.getElementById('result-area').innerHTML = '';
  const steps = STEPS_MAP[mode];
  document.getElementById('load-steps').innerHTML = steps.map((s,i) =>
    `<div class="lstep" id="ls${i}"><div class="ls-dot"></div>${s}</div>`
  ).join('');
  document.getElementById('loading').classList.add('show');
  document.getElementById('action-btn').disabled = true;
  let i = 0;
  function tick() {
    document.querySelectorAll('.lstep').forEach((el, j) => {
      el.classList.remove('done','act');
      if (j < i) el.classList.add('done');
      else if (j === i) el.classList.add('act');
    });
    document.getElementById('load-msg').textContent = steps[i] + '…';
    if (i < steps.length - 2) { i++; loadTimer = setTimeout(tick, 1100); }
  }
  tick();
}

function stopLoad() {
  clearTimeout(loadTimer);
  document.getElementById('loading').classList.remove('show');
  document.getElementById('action-btn').disabled = false;
}

// ── HELPERS ──
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function cxColor(v = '') {
  const s = v.toLowerCase();
  return (s.includes('o(1)') || s.includes('o(log')) ? 'green'
       : (s.includes('o(n)') || s.includes('o(n log')) ? 'amber'
       : 'red';
}
function cxPct(v = '') {
  if (v.includes('1)')) return 10;
  if (v.includes('log')) return 28;
  if (v.includes('n)')) return 52;
  if (v.includes('n²') || v.includes('n^2') || v.includes('n*n')) return 82;
  return 60;
}
function cxBarColor(c) { return c==='green'?'var(--emerald)':c==='amber'?'var(--amber)':'var(--rose)'; }

function copyText(txt, btn) {
  navigator.clipboard.writeText(txt).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied';
    setTimeout(() => btn.innerHTML = orig, 1800);
  });
}

function applyToEditor(code) {
  document.getElementById('code').value = code;
  onCodeInput();
}

function dlCode(txt, ext) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], {type:'text/plain'}));
  a.download = `refactix_output.${ext || 'txt'}`;
  a.click();
}

const EXT = {python:'py',javascript:'js',typescript:'ts',go:'go',rust:'rs',java:'java',cpp:'cpp',php:'php',sql:'sql',swift:'swift',kotlin:'kt',ruby:'rb',csharp:'cs',bash:'sh'};

// ── API CALL ──
async function callAPI(endpoint, body) {
  const r = await fetch(`${API}${endpoint}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const json = await r.json();
  if (!r.ok || !json.success) throw new Error(json.error || 'Server error');
  return json.data;
}

// ── GO (main action) ──
async function go() {
  const code = document.getElementById('code').value.trim();
  if (code.length < 15) return showErr('Write or paste some code first');
  startLoad();
  try {
    const actions = { review: runReview, fix: runFix, convert: runConvert };
    await actions[mode](code);
  } catch(e) {
    stopLoad();
    showErr(e.message.includes('fetch') ? 'Cannot reach server — deploy the backend first' : e.message);
  }
}

async function execute() {
  const code = document.getElementById('code').value.trim();
  if (code.length < 5) return showErr('Write some code to run');
  startLoad();
  try {
    await runCode(code);
  } catch(e) {
    stopLoad();
    showErr(e.message);
  }
}

// ── REVIEW ──
async function runReview(code) {
  const d = await callAPI('/api/review', {code, lang});
  stopLoad();

  const score = Math.min(100, Math.max(0, d.score || 0));
  const col = score >= 75 ? 'var(--emerald)' : score >= 45 ? 'var(--amber)' : 'var(--rose)';
  const glow = score >= 75 ? 'rgba(16,185,129,.45)' : score >= 45 ? 'rgba(245,158,11,.4)' : 'rgba(244,63,94,.4)';

  const bugs = d.bugs || [], sec = d.security || [], perf = d.performance || [], bp = d.best_practices || [];
  const total = bugs.length + sec.length + perf.length + bp.length;
  const tcCol = cxColor(d.time_complexity || ''), scCol = cxColor(d.space_complexity || '');
  const alts = d.alternatives || [];

  const issueIcon = (cls) => {
    const icons = {
      r:`<svg viewBox="0 0 12 12" fill="none"><path d="M6 1A2 2 0 1 0 6 5 2 2 0 0 0 6 1ZM1 10c0-2 2.5-3.5 5-3.5s5 1.5 5 3.5" stroke="var(--rose)" stroke-width="1.1" stroke-linecap="round"/></svg>`,
      a:`<svg viewBox="0 0 12 12" fill="none"><path d="M6 2 1.5 10.5h9L6 2Z" stroke="var(--amber)" stroke-width="1.1" stroke-linejoin="round"/><path d="M6 5.5v3M6 9.5v.3" stroke="var(--amber)" stroke-width="1.1" stroke-linecap="round"/></svg>`,
      b:`<svg viewBox="0 0 12 12" fill="none"><path d="M1.5 9.5 4.5 6.5l3 2 3-5" stroke="var(--cyan)" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
      g:`<svg viewBox="0 0 12 12" fill="none"><path d="M1.5 6l3 3 6-6" stroke="var(--emerald)" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    };
    return icons[cls] || '';
  };

  function renderIssues(items, cls) {
    if (!items.length) return `<div class="no-ii"><svg viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="var(--emerald)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>None found — clean!</div>`;
    return items.map(it => `
      <div class="ii">
        <div class="ii-left">
          <div class="ii-icon ${cls}">${issueIcon(cls)}</div>
          <div class="ii-sev">${it.severity || ''}</div>
        </div>
        <div class="ii-right">
          ${it.line ? `<div class="ii-line">${esc(it.line)}</div>` : ''}
          <div class="ii-text">${esc(it.issue || it)}</div>
        </div>
      </div>`).join('');
  }

  document.getElementById('result-area').innerHTML = `
    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="var(--cyan)" stroke-width="1.2"/><path d="M4.5 6.5l1.5 1.5 2.5-3" stroke="var(--cyan)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Code Quality Score
        </div>
        <span class="gc-badge gb-cyan">${total} issue${total !== 1 ? 's' : ''}</span>
      </div>
      <div class="score-row">
        <div class="score-donut">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="5"/>
            <circle id="s-arc" cx="36" cy="36" r="28" fill="none" stroke="${col}" stroke-width="5"
              stroke-dasharray="176" stroke-dashoffset="176" stroke-linecap="round"
              style="transition:stroke-dashoffset 1.2s cubic-bezier(.16,1,.3,1);filter:drop-shadow(0 0 6px ${glow})"/>
          </svg>
          <div class="score-donut-num" style="color:${col}">${score}</div>
        </div>
        <div class="score-info">
          <div class="score-verdict">${esc(d.verdict || '—')}</div>
          <div class="score-summary">${esc(d.summary || '—')}</div>
          <div class="score-bar-t"><div class="score-bar-f" id="s-bar" style="background:${col}"></div></div>
        </div>
      </div>
    </div>

    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><path d="M1.5 10 4.5 7l3 2 3.5-5.5" stroke="var(--blue)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Complexity Analysis
        </div>
        <span class="gc-badge gb-amber">${esc(d.complexity_rating || '—')}</span>
      </div>
      <div class="cx-grid">
        <div class="cx-item">
          <div class="cx-label">Time Complexity</div>
          <div class="cx-val ${tcCol}">${esc(d.time_complexity || '—')}</div>
          <div class="cx-note">${esc(d.time_explanation || '')}</div>
          <div class="cx-bar-t"><div class="cx-bar-f" style="width:${cxPct(d.time_complexity||'')}%;background:${cxBarColor(tcCol)}"></div></div>
        </div>
        <div class="cx-item">
          <div class="cx-label">Space Complexity</div>
          <div class="cx-val ${scCol}">${esc(d.space_complexity || '—')}</div>
          <div class="cx-note">${esc(d.space_explanation || '')}</div>
          <div class="cx-bar-t"><div class="cx-bar-f" style="width:${cxPct(d.space_complexity||'')}%;background:${cxBarColor(scCol)}"></div></div>
        </div>
      </div>
    </div>

    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><path d="M6.5 2v5M6.5 9v1" stroke="var(--rose)" stroke-width="1.4" stroke-linecap="round"/></svg>
          Issues Found
        </div>
      </div>
      <div class="issue-tabs">
        <button class="itab active" onclick="swITab('rv-bugs',this)"><span class="itab-n ic-r">${bugs.length}</span><span class="itab-l">Bugs</span></button>
        <button class="itab" onclick="swITab('rv-sec',this)"><span class="itab-n ic-a">${sec.length}</span><span class="itab-l">Security</span></button>
        <button class="itab" onclick="swITab('rv-perf',this)"><span class="itab-n ic-b">${perf.length}</span><span class="itab-l">Performance</span></button>
        <button class="itab" onclick="swITab('rv-bp',this)"><span class="itab-n ic-g">${bp.length}</span><span class="itab-l">Best Practices</span></button>
      </div>
      <div class="ipane active" id="rv-bugs">${renderIssues(bugs,'r')}</div>
      <div class="ipane" id="rv-sec">${renderIssues(sec,'a')}</div>
      <div class="ipane" id="rv-perf">${renderIssues(perf,'b')}</div>
      <div class="ipane" id="rv-bp">${renderIssues(bp,'g')}</div>
    </div>

    ${alts.length ? `
    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><path d="M6.5 1 8 4h3L8.5 6l1 3-3-2-3 2 1-3L2 4h3z" fill="var(--violet)" opacity=".5"/></svg>
          Better Approaches
        </div>
        <span class="gc-badge gb-violet">${alts.length} suggestion${alts.length>1?'s':''}</span>
      </div>
      ${alts.map((a,i) => `
        <div class="alt-item">
          <div class="alt-num">${i+1}</div>
          <div>
            <div class="alt-title">${esc(a.title)}</div>
            <div class="alt-desc">${esc(a.description)}</div>
            <div class="alt-chips">
              ${a.time ? `<span class="alt-chip ac-green">Time: ${esc(a.time)}</span>` : ''}
              ${a.space ? `<span class="alt-chip ac-violet">Space: ${esc(a.space)}</span>` : ''}
              ${a.improvement ? `<span class="alt-chip ac-amber">${a.improvement} impact</span>` : ''}
            </div>
          </div>
        </div>`).join('')}
    </div>` : ''}

    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="10" height="10" rx="2" stroke="var(--emerald)" stroke-width="1.2"/><path d="M4 6.5l1.5 1.5 3.5-3.5" stroke="var(--emerald)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Fixed Code
        </div>
        <div class="gc-actions">
          <button class="sm-btn" onclick="copyText(document.getElementById('rv-fixed-code').textContent,this)">
            <svg viewBox="0 0 10 10" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.1"/><path d="M1 6V1h5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>Copy
          </button>
          <button class="sm-btn" onclick="applyToEditor(document.getElementById('rv-fixed-code').textContent)">Apply to Editor</button>
          <button class="sm-btn" onclick="dlCode(document.getElementById('rv-fixed-code').textContent,'${EXT[lang]||'txt'}')">Download</button>
        </div>
      </div>
      <div class="code-out">
        <pre class="co-pre" id="rv-fixed-code">${esc(d.fixed_code || '// No changes needed')}</pre>
      </div>
    </div>`;

  // Animate score ring
  setTimeout(() => {
    const arc = document.getElementById('s-arc');
    if (arc) arc.style.strokeDashoffset = 176 - (score / 100) * 176;
    const bar = document.getElementById('s-bar');
    if (bar) bar.style.width = score + '%';
  }, 100);
}

// ── FIX ──

  const d = await callAPI('/api/fix', {code, lang});
  stopLoad();

  const bugs = d.bugs_found || [];
  const changes = d.changes_made || [];

  const sevClass = s => ({'critical':'bs-critical','high':'bs-high','medium':'bs-medium','low':'bs-low'}[s] || 'bs-medium');

  document.getElementById('result-area').innerHTML = `
    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><path d="M10.5 2.5 8 5M2.5 10.5l2.5-2.5M5 8 4.5 7 7 4.5l2 2L7 8ZM2.5 10.5l.5-.5" stroke="var(--rose)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Bugs Found
        </div>
        <span class="gc-badge gb-rose">${bugs.length} bug${bugs.length !== 1 ? 's' : ''}</span>
      </div>
      ${bugs.length ? bugs.map(b => `
        <div class="bug-item">
          <span class="bug-sev ${sevClass(b.severity)}">${b.severity || 'medium'}</span>
          <div class="bug-body">
            ${b.line ? `<div class="bug-line">${esc(b.line)}</div>` : ''}

            ${b.suggestion ? `<div class="bug-suggest">💡 ${esc(b.suggestion)}</div>` : ''}

        </div>`).join('') : `<div class="no-ii"><svg viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-5" stroke="var(--emerald)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>No bugs found — code looks clean!</div>`}
    </div>

    ${changes.length ? `
    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><path d="M2 6.5l3 3 6-6" stroke="var(--emerald)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Changes Applied
        </div>
      </div>
      ${changes.map(c => `<div class="cn-item" style="padding:10px 16px"><span class="cn-arrow">✓</span>${esc(c)}</div>`).join('')}
    </div>` : ''}

    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><rect x="1.5" y="1.5" width="10" height="10" rx="2" stroke="var(--emerald)" stroke-width="1.2"/><path d="M4 6.5l1.5 1.5 3.5-3.5" stroke="var(--emerald)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Fixed Code
        </div>
        <div class="gc-actions">
          <button class="sm-btn" onclick="copyText(document.getElementById('fix-code-out').textContent,this)"><svg viewBox="0 0 10 10" fill="none"><rect x="3" y="3" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.1"/><path d="M1 6V1h5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>Copy</button>
          <button class="sm-btn" onclick="dlCode(document.getElementById('fix-code-out').textContent,'${EXT[lang]||'txt'}')">Download</button>
        </div>
      </div>
      <div class="code-out">
        <pre class="co-pre" id="fix-code-out">${esc(d.fixed_code || code)}</pre>
      </div>
      <div style="padding:0 16px 14px">

// ── RUN ──
async function runCode(code) {
  const stdin = document.getElementById('stdin').value;
  const r = await fetch(`${API}/api/run`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({code, lang, stdin})
  });
  const json = await r.json();
  stopLoad();

  if (!r.ok) throw new Error(json.error || 'Execution failed');

  const isOk = (json.status || '').toLowerCase().includes('accepted');
  const stdout = json.stdout || '', stderr = json.stderr || '', compile = json.compile_output || '';

  document.getElementById('result-area').innerHTML = `
    <div class="gc">
      <div class="gc-head">
        <div class="gc-title">
          <svg viewBox="0 0 13 13" fill="none"><path d="M3.5 2.5l7 4-7 4v-8Z" stroke="var(--amber)" stroke-width="1.2" stroke-linejoin="round"/></svg>
          Execution Result
        </div>
      </div>
      <div class="run-out">
        <span class="run-status ${isOk ? 'rs-ok' : 'rs-err'}">${esc(json.status || 'Unknown')}</span>
        <div class="run-meta">
          ${json.time ? `<div class="run-meta-item">⏱ Time: <strong>${json.time}s</strong></div>` : ''}
          ${json.memory ? `<div class="run-meta-item">💾 Memory: <strong>${json.memory} KB</strong></div>` : ''}
          <div class="run-meta-item">Lang: <strong>${LANGS[lang]||lang}</strong></div>
        </div>
        ${stdout || compile ? `
          <div class="run-label">Output</div>
          <div class="run-stdout">${esc(compile || stdout || '(no output)')}</div>` : ''}
        ${stderr ? `
          <div class="run-label" style="margin-top:10px;color:var(--rose)">Errors</div>
          <div class="run-stderr">${esc(stderr)}</div>` : ''}
        ${!stdout && !stderr && !compile ? `<div class="run-stdout" style="color:var(--text3)">(program produced no output)</div>` : ''}
      </div>
    </div>`;
}

// ── TAB SWITCH ──
function swITab(pane, btn) {
  const parent = btn.closest('.gc');
  parent.querySelectorAll('.itab').forEach(t => t.classList.remove('active'));
  parent.querySelectorAll('.ipane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(pane).classList.add('active');
}

// ── INIT ──
buildTgtPills();
onCodeInput();
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && document.activeElement === document.getElementById('code')) {
    e.preventDefault(); go();
  }
});
</script>
